name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  security-build-deploy:
    runs-on: ubuntu-latest

    steps:

    # CHECKOUT CODE
    - name: Checkout Code
      uses: actions/checkout@v3

    # SETUP PYTHON
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # INSTALL DEPENDENCIES
    - name: Install Dependencies
      run: |
        pip install -r app/requirements.txt

    # SECRET SCAN
    - name: Install Gitleaks
      run: |
        wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.1/gitleaks_8.18.1_linux_x64.tar.gz
        tar -xzf gitleaks_8.18.1_linux_x64.tar.gz
        sudo mv gitleaks /usr/local/bin/

    - name: Run Gitleaks Scan
      run: |
        gitleaks detect --source . --verbose

    # BUILD DOCKER IMAGE
    - name: Build Docker Image
      run: |
        cd app
        docker build -t flask-devsecops-app .

    # CONTAINER SCAN
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'flask-devsecops-app'

    # IaC SCAN
    - name: Run Checkov
      uses: bridgecrewio/checkov-action@master
      with:
        directory: terraform/


    # DOCKER LOGIN
    - name: DockerHub Login
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ env.DOCKERHUB_PASSWORD }}

    # TAG IMAGE
    - name: Tag Docker Image
      run: |
        docker tag flask-devsecops-app YOUR_DOCKERHUB_USERNAME/flask-devsecops-app:latest

    # PUSH IMAGE
    - name: Push Docker Image
      run: |
        docker push YOUR_DOCKERHUB_USERNAME/flask-devsecops-app:latest

    # DEPLOY DEV
    - name: Deploy to Dev
      run: echo "Deploying to Dev Environment"

    # DEPLOY STAGING
    - name: Deploy to Staging
      run: echo "Deploying to Staging Environment"

    # DEPLOY PROD
    - name: Deploy to Production
      run: echo "Deploying to Production Environment"
